name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Biome check
        run: pnpm exec biome check .
      - name: LOC budget (ADR 0061 Rule 3)
        # Enforces per-file line-count thresholds (300 info / 500
        # warning / 800 error for source; 500/800/1200 for tests),
        # with schema-registry + barrel + grandfathered exemptions.
        # Fails CI on a non-exempt ERROR breach; warnings/infos are
        # surfaced in the log without blocking.
        run: pnpm lint:loc
      - name: Markdown link check (Codex P1.2 / E3b)
        # Scans docs/website/**/*.md{,x} for unresolved local links,
        # MyST-slug-aware. Informational only — does not fail CI per
        # the E3b decision; the signal is surfaced in the log so
        # future sweep PRs can target it.
        run: pnpm lint:links
      - name: Page-status check (ADR 0062 / Codex P2)
        # Reports the page-status distribution + rollout gaps + any
        # unknown status values across docs/website/**/*.md{,x}.
        # BLOCKING since 2026-05-19 (after the ADR 0062 + PR #126
        # rollout reached 100% on decisions/ + reference/). Hard-fail
        # surfaces:
        #   1. any page with a status: value outside PageStatusSchema
        #      (typo catch — should never occur once extractor S0
        #      runs on contract pages, but covers non-contract pages
        #      that bypass the extractor);
        #   2. any ADR or reference page missing status: (catches
        #      rollout-regression — a new ADR landing without status
        #      would silently render no-status in the dashboard);
        #   3. any page declaring a validation: block without a paired
        #      status: field — promoted from informational to blocking
        #      in A+ hardening Phase C (a validation: block opts the
        #      page into the dashboard contract, so missing status:
        #      renders a silently-undefined lifecycle column).
        run: pnpm lint:status
      - name: Back-compat shim detection (A+ hardening Phase C)
        # Pre-launch invariant per AGENTS.md "Pre-launch; no backwards
        # compatibility": zero @deprecated JSDoc tags and zero
        # // COMPAT / // SHIM / // LEGACY / // BACKCOMPAT comment
        # markers in packages/ or examples/. Sophie has zero production
        # students; back-compat shims are dead-shape drift that defeats
        # the "build the best now" rule and accumulates AI-author
        # confusion. Fails CI on any match.
        run: pnpm lint:shims
      - name: Doc-drift detection (post-A+ P1, 2026-05-25)
        # Defends the 2026-05-18 EqRef class-of-issue per ADR 0061
        # Rule 5 ("docs land atomically with code"). PR-A's batch 5a
        # hard-renamed <EqRef> -> <EquationRef> in the component layer
        # but left ~50 stale references in docstrings, ADR prose,
        # runtime comments, and reference docs; the audit caught 12,
        # the cleanup PR (#102 / 5d85c91) cleaned the rest. Same class
        # surfaced again at PR #168 (<CollapsibleCard> -> <Dropdown>).
        # Stale legacy-name mentions actively mislead the AI author
        # because docs are templates the AI copies when authoring new
        # content (ADR 0061 Rule 5 rationale). This gate enforces a
        # legacy-name registry: every hard rename adds an entry, and
        # CI rejects PRs that reintroduce the retired name outside an
        # intentional narrative context. Fails CI on any drift.
        run: pnpm lint:docs-drift
      - name: axe-on-render coverage (R11, 2026-05-25)
        # AGENTS.md R11 + ADR 0004's "axe-core tests are mandatory on
        # every component PR" mandate. Every *.test.tsx under
        # packages/components/src/ that calls render() must also call
        # axe(), AxeBuilder, or toHaveNoViolations. Render-without-axe
        # is the class-of-issue this gate defends: P3 closure audit
        # (PR #185) found 2 quiet gaps in a coverage state advertised
        # as 100% (RetrievalCard, EquationRef biography-summary); the
        # R11 wave found a third (InlineMath rendered KaTeX DOM with
        # zero axe calls — caught only by the finer-grained per-file
        # render/axe pairing this script enforces). Without R11 the
        # ADR 0004 mandate is aspirational rather than verified; with
        # R11 it's a CI invariant. Audit-traceable exclusions
        # (runtime/, _helpers/, __mocks__/, _template/, use*.test.tsx,
        # ParameterCursor) live in the script header. Fails CI on any
        # render() without paired axe().
        run: pnpm lint:axe-render
      - name: epistemic-role declaration coverage (R13, 2026-05-28)
        # AGENTS.md R13 + ADR 0058's graduation of the eight-role
        # epistemic contract from optional/additive to enforced-for-new.
        # Every component dir under packages/components/src/components/
        # must declare an epistemicRole (the canonical
        # X_EPISTEMIC_ROLE = "<role>" as const satisfies EpistemicRole
        # pattern), bind role per-slot (OMI composites), or be on the
        # CHROME / GRANDFATHERED allowlist with a per-entry rationale.
        # A new pedagogy component that silently ships without a role is
        # the class-of-issue this gate defends: it makes "Sophie is a
        # Scientific Reasoning OS" a CI invariant rather than a
        # convention. GRANDFATHERED entries (contestable pedagogy
        # pending an Anna-adjudicated domain pass) are tracked, not
        # blocking; CHROME is exempt-silent. Allowlists + rationales
        # live in the script header. Fails CI on any non-exempt
        # role-less component dir.
        run: pnpm lint:epistemic-role

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-typecheck-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-typecheck-
            ${{ runner.os }}-turbo-
      - name: Turborepo typecheck (all packages + smoke)
        run: pnpm exec turbo run typecheck

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-unit-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-unit-
            ${{ runner.os }}-turbo-
      - name: Build @sophie/docs (MyST HTML — required for I5 href test)
        # The I5 integration test in
        # packages/astro/src/lib/validation/index-generator.integration.test.ts
        # resolves every dashboard href against the rendered MyST HTML
        # build. Without this step the test fails loud (per the I7
        # fail-loud invariant), so the unit job builds the docs first.
        # Turborepo cache (restored above) makes this ~0s on cache hit.
        run: pnpm exec turbo run build --filter=@sophie/docs
      - name: Vitest (unit + coverage)
        run: pnpm exec turbo run test:unit
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            packages/*/coverage/
            !**/node_modules/**
          if-no-files-found: warn

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-
      - name: Turborepo build (packages + smoke)
        run: pnpm exec turbo run build

  e2e:
    name: e2e
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-e2e-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-${{ github.sha }}
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-
      - name: Build smoke target (and workspace deps)
        # Use `turbo run build --filter=smoke` (not `pnpm --filter`) so
        # Turborepo follows the workspace dependency graph and builds
        # @sophie/core → @sophie/{components,theme} → @sophie/astro
        # before smoke. With `pnpm --filter smoke build` the deps were
        # never built (e2e was silently skipped due to the build job's
        # own failure on Linux, masking this). The Turborepo cache
        # restored above turns most of this into a cache hit.
        run: pnpm exec turbo run build --filter=smoke
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Playwright e2e
        run: pnpm test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            examples/smoke/playwright-report/
            examples/smoke/test-results/
          if-no-files-found: ignore

  storybook:
    name: storybook
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-storybook-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-storybook-
            ${{ runner.os }}-turbo-build-${{ github.sha }}
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-
      - name: Build Storybook (and workspace deps)
        # Like the e2e job, use `turbo run build-storybook` so the
        # workspace dep graph (@sophie/theme, @sophie/core →
        # @sophie/components) is built in order. Turborepo cache makes
        # most of this a cache hit.
        run: pnpm exec turbo run build-storybook --filter=@sophie/components
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Serve Storybook + run test-runner
        # Ad-hoc http-server keeps Sophie's devDep list small; in
        # practice GitHub-hosted runners cache the npx-installed
        # binaries via the npm cache, so runtime cost is minimal.
        run: |
          npx -y http-server packages/components/storybook-static -p 6006 --silent &
          SERVER_PID=$!
          npx -y wait-on tcp:127.0.0.1:6006 -t 60000
          pnpm --filter @sophie/components test:storybook
          kill "$SERVER_PID" 2>/dev/null || true
      - name: Upload Storybook test-runner artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: storybook-test-output
          path: |
            packages/components/storybook-static/
          if-no-files-found: ignore

  vr:
    name: visual-regression
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-vr-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-vr-
            ${{ runner.os }}-turbo-storybook-${{ github.sha }}
            ${{ runner.os }}-turbo-storybook-
            ${{ runner.os }}-turbo-build-${{ github.sha }}
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-
      - name: Build Storybook (and workspace deps)
        # Same shape as the storybook job: turbo follows the workspace
        # dep graph and the cache restored above usually makes this a
        # cache hit when both jobs run on the same SHA.
        run: pnpm exec turbo run build-storybook --filter=@sophie/components
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Serve Storybook + run VR test-runner
        # Mirror the storybook job's serve pattern. test:vr defaults to
        # http://127.0.0.1:6006 (see packages/components/package.json),
        # so no extra wiring is needed.
        run: |
          npx -y http-server packages/components/storybook-static -p 6006 --silent &
          SERVER_PID=$!
          npx -y wait-on tcp:127.0.0.1:6006 -t 60000
          pnpm --filter @sophie/components test:vr
          kill "$SERVER_PID" 2>/dev/null || true
      - name: Upload VR diff artifacts on failure
        # jest-image-snapshot writes diffs to __diff_output__ alongside
        # the snapshot dir; test-storybook also drops a test-results
        # tree. List both — actions/upload-artifact tolerates either
        # being absent thanks to if-no-files-found: ignore.
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: vr-diffs
          path: |
            packages/components/__snapshots__/**/__diff_output__/
            packages/components/__image_snapshots_diff__/
            packages/components/test-results/
          retention-days: 7
          if-no-files-found: ignore

  packed-smoke:
    name: packed-smoke
    needs: build
    runs-on: ubuntu-latest
    # PR-D1 (ADR-0082 follow-up + PR #172 review item 2): structural
    # defense against the packed-vs-workspace regression class. The
    # examples/packed-smoke/ consumer is OUTSIDE the pnpm workspace by
    # design — it consumes @sophie/* via pnpm pack + file: tarball
    # install (NOT workspace links), so React #418 hydration mismatches
    # that workspace-resolution masks become surfaceable. One Playwright
    # spec asserts 0 × #418 on a chapter exercising all 5 store-backed
    # components with client:load.
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-packed-smoke-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-packed-smoke-
            ${{ runner.os }}-turbo-build-${{ github.sha }}
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-
      - name: Build + pack + install @sophie/* into packed-smoke
        # Builds @sophie/{core,theme,components,astro}, packs each into
        # a tarball, strips inter-@sophie deps from each tarball's
        # package.json (pnpm pack rewrites workspace:* → "0.0.0" which
        # the npm registry can't resolve), and installs the tarballs
        # into examples/packed-smoke/. Idempotent.
        run: bash examples/packed-smoke/scripts/sync-packed.sh
      - name: Build packed-smoke (astro build)
        run: pnpm --dir examples/packed-smoke build
      - name: Install Playwright browsers
        run: pnpm --dir examples/packed-smoke exec playwright install --with-deps chromium
      - name: Playwright spec (hydration-mismatch defense)
        run: pnpm --dir examples/packed-smoke exec playwright test
      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: packed-smoke-playwright-report
          path: |
            examples/packed-smoke/playwright-report/
            examples/packed-smoke/test-results/
          if-no-files-found: ignore
