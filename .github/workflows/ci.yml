name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Biome check
        run: pnpm exec biome check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-typecheck-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-typecheck-
            ${{ runner.os }}-turbo-
      - name: Turborepo typecheck (all packages + smoke)
        run: pnpm exec turbo run typecheck

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-unit-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-unit-
            ${{ runner.os }}-turbo-
      - name: Vitest (unit + coverage)
        run: pnpm exec turbo run test:unit
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            packages/*/coverage/
            !**/node_modules/**
          if-no-files-found: warn

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-
      - name: Turborepo build (packages + smoke)
        run: pnpm exec turbo run build
      - name: Inventory smoke build outputs (build-failure debug)
        if: failure()
        run: |
          echo "=== examples/smoke/ ==="
          ls -la examples/smoke/ || true
          echo "=== examples/smoke/dist/ ==="
          ls -laR examples/smoke/dist/ 2>&1 | head -200 || true
          echo "=== examples/smoke/.astro/ ==="
          ls -la examples/smoke/.astro/ 2>&1 | head -40 || true
          echo "=== find any *.prerender* anywhere under examples/ ==="
          find examples/ -name '*prerender*' -maxdepth 6 2>&1 | head -40 || true
      - name: Upload smoke debug artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-build-debug
          path: |
            examples/smoke/dist/
            examples/smoke/.astro/
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: e2e
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-e2e-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-${{ github.sha }}
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-
      - name: Build smoke target
        run: pnpm --filter smoke build
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Playwright e2e
        run: pnpm test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            examples/smoke/playwright-report/
            examples/smoke/test-results/
          if-no-files-found: ignore
